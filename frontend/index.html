<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
  <title>Secure Family Chart</title>
  <script>
    // Runs before any CSS/paint so the page never flashes the wrong theme.
    // Kept in sync with frontend/theme.js's getPreferredTheme() logic.
    (function () {
      try {
        var stored = window.localStorage.getItem('family-chart-theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_error) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
