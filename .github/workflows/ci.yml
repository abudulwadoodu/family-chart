name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: familytree
          POSTGRES_USER: familytree_app
          POSTGRES_PASSWORD: familytree_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U familytree_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://familytree_app:familytree_ci@localhost:5432/familytree
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run test:backend
      - run: npm run build:app
