name: Deploy to Production

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:app
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_COGNITO_OAUTH_DOMAIN: ${{ secrets.VITE_COGNITO_OAUTH_DOMAIN }}
          VITE_SUPPORT_EMAIL: ${{ secrets.VITE_SUPPORT_EMAIL }}

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known_hosts
        run: ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync built frontend
        run: |
          rsync -az --delete \
            dist/app/ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/family-chart/dist/app/"

      - name: Sync backend source and manifests
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='node_modules/' \
            backend/ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/family-chart/backend/"
          rsync -az package.json package-lock.json \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/family-chart/"

      - name: Install backend prod dependencies and reload
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            source ~/.nvm/nvm.sh
            nvm use 24.15.0
            cd /home/ubuntu/family-chart
            npm ci --omit=dev
            pm2 reload family-backend --update-env
          '

      - name: Health check
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            sleep 2
            curl -fsS http://localhost/ > /dev/null
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/)
            echo "backend /api/ status: $status"
            if [ "$status" -ge 500 ]; then exit 1; fi
          '
